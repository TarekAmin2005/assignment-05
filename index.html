<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Github Issues Tracker</title>

<!-- Tailwind + DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- LOGIN PAGE -->

<div id="loginPage" class="flex items-center justify-center min-h-screen ">

<div class="card w-96 bg-white shadow-xl p-6">

<div class="flex flex-col items-center">

<img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-16 mb-4"/>

<h2 class="text-xl font-bold  text-black">GitHub Issues Tracker</h2>

<p class="text-gray-500 text-sm mb-4">Sign in to manage your issues</p>

</div>

<label class="label text-black">Username</label>
<input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full bg-slate-50 text-black"/>

<p class="text-blue-600 text-sm">Default: admin</p>

<label class="label mt-3 text-black">Password</label>
<input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full bg-slate-50 text-black"/>

<p class="text-blue-600 text-sm">Default: admin123</p>

<button onclick="login()" class="btn btn-primary mt-4 bg-gradient-to-r from-purple-500 to-indigo-600 border-none">
Sign In
</button>

<div class="divider">OR</div>

<div class="bg-gray-100 p-3 rounded text-center text-sm">
<b>Username:</b> admin<br>
<b>Password:</b> admin123
</div>

</div>

</div>



<!-- MAIN PAGE -->

<div id="mainPage" class="hidden pb-12">

<!-- NAVBAR -->

<div class="navbar bg-white shadow ">

<div class="flex-1 space-x-4">
<div><img src="./assets/github-logo.png" class="w-8 h-8" alt=""></div>
<h1 class="text-lg font-bold text-black">GitHub Issues Tracker</h1>

</div>

<div class="flex gap-2">

<input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered bg-white text-black"/>

<button onclick="searchIssue()" class="btn btn-primary">
Search
</button>

</div>

</div>



<!-- MAIN CONTAINER -->

<div class="max-w-7xl mx-auto mt-6">

<!-- TABS -->
<div class="bg-white p-4 rounded-lg w-full mb-4">
  <div class="tabs tabs-boxed gap-3 w-full justify-start bg-white">

    <!-- All is gradient by default -->
    <a id="tabAll" onclick="filterIssues('all')" class="tab bg-gradient-to-r from-purple-600 to-indigo-600 text-white border-none rounded-md px-6">
      All
    </a>

    <a id="tabOpen" onclick="filterIssues('open')" class="tab bg-slate-100 text-gray-500 rounded-md px-6">
      Open
    </a>

    <a id="tabClosed" onclick="filterIssues('closed')" class="tab bg-slate-100 text-gray-500 rounded-md px-6">
      Closed
    </a>

  </div>
</div>


<!-- ISSUE HEADER -->

<div class="bg-white p-4 rounded shadow mb-6 flex justify-between items-center ">

<div>
<h2 class="font-bold text-lg text-black"><span id="issueCount">0</span> Issues</h2>
<p class="text-gray-500 text-sm">Track and manage your project issues</p>
</div>

<div class="flex gap-4 text-sm">

<span class="flex items-center gap-1">
<div class="w-3 h-3 bg-green-500 rounded-full"></div>
Open
</span>

<span class="flex items-center gap-1">
<div class="w-3 h-3 bg-purple-500 rounded-full"></div>
Closed
</span>

</div>

</div>



<!-- LOADER -->

<div id="loader" class="flex justify-center my-10 hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>



<!-- ISSUE GRID -->

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
</div>

</div>

</div>



<!-- MODAL -->

<!-- Modal -->
<input type="checkbox" id="issue-modal" class="modal-toggle" />

<div class="modal">
  <div class="modal-box max-w-3xl p-8 bg-white rounded-2xl">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-2">
      <h2 id="modalTitle" class="text-2xl font-semibold text-gray-800"></h2>
    </div>

    <!-- Status + Meta -->
    <div class="flex items-center gap-3 text-sm text-gray-500 mb-4">
      <span id="modalStatus" class="badge"></span>
      <span>• Opened by <span id="modalAuthor" class="font-medium text-gray-700"></span></span>
      <span>• <span id="modalDate"></span></span>
    </div>

    <!-- Tags -->
    <div id="modalLabels" class="flex gap-3 mb-6"></div>

    <!-- Description -->
    <p id="modalDesc" class="text-gray-500 mb-6"></p>

    <!-- Info Card -->
    <div class="bg-gray-100 rounded-xl p-6 flex justify-between items-center mb-6">

      <!-- Assignee -->
      <div>
        <p class="text-gray-500 text-sm">Assignee:</p>
        <p id="modalAssignee" class="font-semibold text-gray-800"></p>
      </div>

      <!-- Priority -->
      <div>
        <p class="text-gray-500 text-sm mb-1">Priority:</p>
        <span id="modalPriority" class="badge px-4 py-3 rounded-full text-white"></span>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-action justify-end">
      <label
        for="issue-modal"
        class="btn text-white border-none px-6 rounded-lg"
        style="background: linear-gradient(135deg,#6d28d9,#4f46e5);"
      >
        Close
      </label>
    </div>

  </div>
</div>


<script src="script.js"></script>

</body>
</html>
